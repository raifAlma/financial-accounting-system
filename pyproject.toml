[tool.black]
line-length = 88
target-version = ['py311']
exclude = '''
(
    \.eggs
  | \.git
  | \.venv
  | env
  | venv
  | tools
  | .*/__init__\.py
)
'''
[tool.isort]
profile = "black"
line_length = 88
lines_after_imports = 2
skip = ["__init__.py"]

[tool.flake8]
exclude = [".git", "__pycache__", "venv", "__init__.py", "tools"]
max-line-length = 88
ignore = ["E203", "E266", "E501", "W503"]
max-complexity = 10